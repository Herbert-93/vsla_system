name: Build & Release VSLA Windows Installer

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

env:
  FLUTTER_VERSION: '3.22.0'
  FLUTTER_CHANNEL: stable

jobs:
  build-and-release:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=1.0.${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate Windows platform files
        run: flutter create --platforms=windows --org com.vsla .

      - name: Create assets directory
        shell: bash
        run: mkdir -p assets/images

      - name: Build Windows release
        run: flutter build windows --release --build-name=${{ env.VERSION }} --build-number=${{ github.run_number }}

      - name: Find build output
        shell: pwsh
        run: |
          Write-Host "=== Searching entire build folder for exe ==="
          $exeFiles = Get-ChildItem -Path "build" -Filter "vsla_app.exe" -Recurse -ErrorAction SilentlyContinue
          
          if ($exeFiles.Count -eq 0) {
            Write-Host "ERROR: vsla_app.exe not found. Listing entire build folder:"
            Get-ChildItem -Path "build" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
            exit 1
          }
          
          $exePath = $exeFiles[0].FullName
          $exeDir  = $exeFiles[0].DirectoryName
          
          Write-Host "Found: $exePath"
          Write-Host "Folder: $exeDir"
          Write-Host "Contents:"
          Get-ChildItem -Path $exeDir | Select-Object Name, Length
          
          # Save to env for next steps
          "EXE_DIR=$exeDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Create installer output directory
        shell: bash
        run: mkdir -p installer/output

      - name: Generate Inno Setup script
        shell: pwsh
        run: |
          $exeDir = "${{ env.EXE_DIR }}"
          $version = "${{ env.VERSION }}"

          $issContent = @"
          #define MyAppName "VSLA Desktop"
          #define MyAppVersion "$version"
          #define MyAppPublisher "VSLA"
          #define MyAppExeName "vsla_app.exe"

          [Setup]
          AppId={{A1B2C3D4-E5F6-7890-ABCD-EF1234567890}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppPublisher={#MyAppPublisher}
          DefaultDirName={autopf}\{#MyAppName}
          DefaultGroupName={#MyAppName}
          AllowNoIcons=yes
          OutputDir=installer\output
          OutputBaseFilename=VSLA-Desktop-Setup-v{#MyAppVersion}
          Compression=lzma2/ultra64
          SolidCompression=yes
          WizardStyle=modern
          DisableProgramGroupPage=yes
          UninstallDisplayIcon={app}\{#MyAppExeName}
          UninstallDisplayName={#MyAppName}
          MinVersion=10.0
          ArchitecturesInstallIn64BitMode=x64
          PrivilegesRequired=lowest
          PrivilegesRequiredOverridesAllowed=dialog

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Tasks]
          Name: "desktopicon"; Description: "Create a &desktop shortcut"; GroupDescription: "Additional icons:"; Flags: unchecked

          [Files]
          Source: "$exeDir\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"
          Name: "{group}\Uninstall {#MyAppName}"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon

          [Run]
          Filename: "{app}\{#MyAppExeName}"; Description: "Launch {#MyAppName}"; Flags: nowait postinstall skipifsilent

          [UninstallRun]
          Filename: "{cmd}"; Parameters: "/C taskkill /IM {#MyAppExeName} /F"; Flags: runhidden; RunOnceId: "KillApp"
          "@

          $issContent | Out-File -FilePath "installer\setup.iss" -Encoding utf8
          Write-Host "Generated setup.iss:"
          Get-Content "installer\setup.iss"

      - name: Compile Inno Setup installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\setup.iss
          if %errorlevel% neq 0 (
            echo ERROR: Inno Setup compilation failed!
            exit /b 1
          )

      - name: Verify and set installer path
        shell: pwsh
        run: |
          $installers = Get-ChildItem -Path "installer\output" -Filter "*.exe" -ErrorAction SilentlyContinue
          if ($installers.Count -eq 0) {
            Write-Host "ERROR: No installer .exe found in installer\output\"
            exit 1
          }
          $installer = $installers[0]
          Write-Host "Installer ready: $($installer.FullName)"
          "INSTALLER_NAME=$($installer.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: VSLA-Desktop-Installer-v${{ env.VERSION }}-build${{ github.run_number }}
          path: installer/output/*.exe
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VSLA Desktop v${{ env.VERSION }} (build ${{ github.run_number }})
          tag_name: build-${{ github.run_number }}
          body: |
            ## VSLA Desktop v${{ env.VERSION }}

            ### How to install
            1. Download **${{ env.INSTALLER_NAME }}** below
            2. Double-click the installer
            3. Follow the setup wizard
            4. Launch **VSLA Desktop** from Start Menu or Desktop

            ### Requirements
            - Windows 10 or later (64-bit)
            - Internet connection required for login

            ### Build info
            - Branch: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
            - Build: `${{ github.run_number }}`
          files: installer/output/*.exe
          draft: false
          prerelease: false
          token: ${{ secrets.GH_TOKEN }}