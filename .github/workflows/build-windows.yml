name: Build & Release VSLA Windows Installer

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

env:
  FLUTTER_VERSION: '3.22.0'
  FLUTTER_CHANNEL: stable

jobs:
  build-and-release:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=1.0.${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate Windows platform files
        run: flutter create --platforms=windows --org com.vsla .

      - name: Create assets directory
        shell: bash
        run: mkdir -p assets/images

      - name: Build Windows release
        run: flutter build windows --release --build-name=${{ env.VERSION }} --build-number=${{ github.run_number }}

      - name: Find build output and set paths
        shell: pwsh
        run: |
          $releaseDir = "build\windows\x64\runner\Release"

          Write-Host "=== Contents of Release folder ==="
          Get-ChildItem -Path $releaseDir | Select-Object Name, Length

          $exeFile = Get-ChildItem -Path $releaseDir -Filter "*.exe" -File | Select-Object -First 1

          if ($null -eq $exeFile) {
            Write-Host "ERROR: No .exe found in $releaseDir"
            exit 1
          }

          Write-Host "Found exe: $($exeFile.Name)"
          "EXE_NAME=$($exeFile.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_DIR=$releaseDir"   | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Create installer output directory
        run: New-Item -ItemType Directory -Force -Path "installer\output"

      - name: Generate Inno Setup script
        shell: pwsh
        run: |
          $exeName    = "${{ env.EXE_NAME }}"
          $releaseDir = "${{ env.RELEASE_DIR }}"
          $version    = "${{ env.VERSION }}"
          $absDir     = (Resolve-Path $releaseDir).Path
          $appId      = '{{A1B2C3D4-E5F6-7890-ABCD-EF1234567890}'

          $iss = "[Setup]`r`n"
          $iss += "AppId=$appId`r`n"
          $iss += "AppName=VSLA Desktop`r`n"
          $iss += "AppVersion=$version`r`n"
          $iss += "AppPublisher=VSLA`r`n"
          $iss += "DefaultDirName={autopf}\VSLA Desktop`r`n"
          $iss += "DefaultGroupName=VSLA Desktop`r`n"
          $iss += "AllowNoIcons=yes`r`n"
          $iss += "OutputDir=installer\output`r`n"
          $iss += "OutputBaseFilename=VSLA-Desktop-Setup-v$version`r`n"
          $iss += "Compression=lzma2/ultra64`r`n"
          $iss += "SolidCompression=yes`r`n"
          $iss += "WizardStyle=modern`r`n"
          $iss += "DisableProgramGroupPage=yes`r`n"
          $iss += "UninstallDisplayIcon={app}\$exeName`r`n"
          $iss += "UninstallDisplayName=VSLA Desktop`r`n"
          $iss += "MinVersion=10.0`r`n"
          $iss += "ArchitecturesInstallIn64BitMode=x64`r`n"
          $iss += "PrivilegesRequired=lowest`r`n"
          $iss += "PrivilegesRequiredOverridesAllowed=dialog`r`n"
          $iss += "`r`n"
          $iss += "[Languages]`r`n"
          $iss += "Name: " + [char]34 + "english" + [char]34 + "; MessagesFile: " + [char]34 + "compiler:Default.isl" + [char]34 + "`r`n"
          $iss += "`r`n"
          $iss += "[Tasks]`r`n"
          $iss += "Name: " + [char]34 + "desktopicon" + [char]34 + "; Description: " + [char]34 + "Create a &desktop shortcut" + [char]34 + "; GroupDescription: " + [char]34 + "Additional icons:" + [char]34 + "; Flags: unchecked`r`n"
          $iss += "`r`n"
          $iss += "[Files]`r`n"
          $iss += "Source: " + [char]34 + "$absDir\*" + [char]34 + "; DestDir: " + [char]34 + "{app}" + [char]34 + "; Flags: ignoreversion recursesubdirs createallsubdirs`r`n"
          $iss += "`r`n"
          $iss += "[Icons]`r`n"
          $iss += "Name: " + [char]34 + "{group}\VSLA Desktop" + [char]34 + "; Filename: " + [char]34 + "{app}\$exeName" + [char]34 + "`r`n"
          $iss += "Name: " + [char]34 + "{group}\Uninstall VSLA Desktop" + [char]34 + "; Filename: " + [char]34 + "{uninstallexe}" + [char]34 + "`r`n"
          $iss += "Name: " + [char]34 + "{autodesktop}\VSLA Desktop" + [char]34 + "; Filename: " + [char]34 + "{app}\$exeName" + [char]34 + "; Tasks: desktopicon`r`n"
          $iss += "`r`n"
          $iss += "[Run]`r`n"
          $iss += "Filename: " + [char]34 + "{app}\$exeName" + [char]34 + "; Description: " + [char]34 + "Launch VSLA Desktop" + [char]34 + "; Flags: nowait postinstall skipifsilent`r`n"
          $iss += "`r`n"
          $iss += "[UninstallRun]`r`n"
          $iss += "Filename: " + [char]34 + "{cmd}" + [char]34 + "; Parameters: " + [char]34 + "/C taskkill /IM $exeName /F" + [char]34 + "; Flags: runhidden; RunOnceId: " + [char]34 + "KillApp" + [char]34 + "`r`n"

          # Write as ASCII — no BOM, no encoding issues with Inno Setup
          [System.IO.File]::WriteAllText(
            (Join-Path (Get-Location) "installer\setup.iss"),
            $iss,
            [System.Text.Encoding]::ASCII
          )

          Write-Host "=== Generated setup.iss ==="
          Get-Content "installer\setup.iss"

      - name: Compile Inno Setup installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\setup.iss
          if %errorlevel% neq 0 (
            echo ERROR: Inno Setup compilation failed!
            exit /b 1
          )

      - name: Verify installer
        shell: pwsh
        run: |
          $installers = Get-ChildItem -Path "installer\output" -Filter "*.exe" -ErrorAction SilentlyContinue
          if ($installers.Count -eq 0) {
            Write-Host "ERROR: No installer found in installer\output\"
            exit 1
          }
          $installer = $installers[0]
          Write-Host "Installer ready: $($installer.FullName)"
          "INSTALLER_NAME=$($installer.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: VSLA-Desktop-Installer-v${{ env.VERSION }}-build${{ github.run_number }}
          path: installer/output/*.exe
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VSLA Desktop v${{ env.VERSION }} (build ${{ github.run_number }})
          tag_name: build-${{ github.run_number }}
          body: |
            ## VSLA Desktop v${{ env.VERSION }}

            ### How to install
            1. Download **${{ env.INSTALLER_NAME }}** below
            2. Double-click the installer
            3. Follow the setup wizard
            4. Launch **VSLA Desktop** from Start Menu or Desktop

            ### Requirements
            - Windows 10 or later (64-bit)
            - Internet connection required for login

            ### Build info
            - Branch: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
            - Build: `${{ github.run_number }}`
          files: installer/output/*.exe
          draft: false
          prerelease: false
          token: ${{ secrets.GH_TOKEN }}