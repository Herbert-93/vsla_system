name: Build & Release VSLA Windows Installer

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

env:
  FLUTTER_VERSION: '3.22.0'
  FLUTTER_CHANNEL: stable

jobs:
  build-and-release:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=1.0.${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate Windows platform files
        run: flutter create --platforms=windows --org com.vsla .

      - name: Create assets directory
        shell: bash
        run: mkdir -p assets/images

      - name: Build Windows release
        run: flutter build windows --release --build-name=${{ env.VERSION }} --build-number=${{ github.run_number }}

      - name: Find build output
        shell: pwsh
        run: |
          $releaseDir = "build\windows\x64\runner\Release"
          Write-Host "=== Contents of Release folder ==="
          Get-ChildItem -Path $releaseDir | Select-Object Name, Length

          $exeFile = Get-ChildItem -Path $releaseDir -Filter "*.exe" -File | Select-Object -First 1
          if ($null -eq $exeFile) {
            Write-Host "ERROR: No .exe found in $releaseDir"
            exit 1
          }
          Write-Host "Found exe: $($exeFile.Name)"
          "EXE_NAME=$($exeFile.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_DIR=$releaseDir"   | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download and bundle sqlite3.dll
        shell: pwsh
        run: |
          $url      = "https://www.sqlite.org/2024/sqlite-dll-win-x64-3450200.zip"
          $zip      = "sqlite3.zip"
          $release  = "${{ env.RELEASE_DIR }}"

          Write-Host "Downloading sqlite3.dll..."
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing

          Write-Host "Extracting..."
          Expand-Archive -Path $zip -DestinationPath "sqlite3_extracted" -Force

          $dll = Get-ChildItem -Path "sqlite3_extracted" -Filter "sqlite3.dll" -Recurse | Select-Object -First 1
          if ($null -eq $dll) {
            Write-Host "ERROR: sqlite3.dll not found in downloaded zip"
            exit 1
          }

          Copy-Item $dll.FullName -Destination $release -Force
          Write-Host "sqlite3.dll successfully copied to $release"

          Write-Host "=== Updated Release folder contents ==="
          Get-ChildItem -Path $release | Select-Object Name, Length

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Generate and compile installer
        shell: pwsh
        run: |
          $exeName    = "${{ env.EXE_NAME }}"
          $releaseDir = "${{ env.RELEASE_DIR }}"
          $version    = "${{ env.VERSION }}"
          $absDir     = (Resolve-Path $releaseDir).Path
          $appId      = '{{A1B2C3D4-E5F6-7890-ABCD-EF1234567890}'

          # Use absolute path so Inno Setup always outputs here
          $outputDir  = (Join-Path (Get-Location).Path "output")
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null
          Write-Host "Output dir: $outputDir"

          $q = [char]34

          $iss  = "[Setup]`r`n"
          $iss += "AppId=$appId`r`n"
          $iss += "AppName=VSLA Desktop`r`n"
          $iss += "AppVersion=$version`r`n"
          $iss += "AppPublisher=VSLA`r`n"
          $iss += "DefaultDirName={autopf}\VSLA Desktop`r`n"
          $iss += "DefaultGroupName=VSLA Desktop`r`n"
          $iss += "AllowNoIcons=yes`r`n"
          $iss += "OutputDir=$outputDir`r`n"
          $iss += "OutputBaseFilename=VSLA-Desktop-Setup-v$version`r`n"
          $iss += "Compression=lzma2/ultra64`r`n"
          $iss += "SolidCompression=yes`r`n"
          $iss += "WizardStyle=modern`r`n"
          $iss += "DisableProgramGroupPage=yes`r`n"
          $iss += "UninstallDisplayIcon={app}\$exeName`r`n"
          $iss += "UninstallDisplayName=VSLA Desktop`r`n"
          $iss += "MinVersion=10.0`r`n"
          $iss += "ArchitecturesInstallIn64BitMode=x64`r`n"
          $iss += "PrivilegesRequired=lowest`r`n"
          $iss += "PrivilegesRequiredOverridesAllowed=dialog`r`n"
          $iss += "`r`n"
          $iss += "[Languages]`r`n"
          $iss += "Name: ${q}english${q}; MessagesFile: ${q}compiler:Default.isl${q}`r`n"
          $iss += "`r`n"
          $iss += "[Tasks]`r`n"
          $iss += "Name: ${q}desktopicon${q}; Description: ${q}Create a &desktop shortcut${q}; GroupDescription: ${q}Additional icons:${q}; Flags: unchecked`r`n"
          $iss += "`r`n"
          $iss += "[Files]`r`n"
          $iss += "Source: ${q}${absDir}\*${q}; DestDir: ${q}{app}${q}; Flags: ignoreversion recursesubdirs createallsubdirs`r`n"
          $iss += "`r`n"
          $iss += "[Icons]`r`n"
          $iss += "Name: ${q}{group}\VSLA Desktop${q}; Filename: ${q}{app}\$exeName${q}`r`n"
          $iss += "Name: ${q}{group}\Uninstall VSLA Desktop${q}; Filename: ${q}{uninstallexe}${q}`r`n"
          $iss += "Name: ${q}{autodesktop}\VSLA Desktop${q}; Filename: ${q}{app}\$exeName${q}; Tasks: desktopicon`r`n"
          $iss += "`r`n"
          $iss += "[Run]`r`n"
          $iss += "Filename: ${q}{app}\$exeName${q}; Description: ${q}Launch VSLA Desktop${q}; Flags: nowait postinstall skipifsilent`r`n"
          $iss += "`r`n"
          $iss += "[UninstallRun]`r`n"
          $iss += "Filename: ${q}{cmd}${q}; Parameters: ${q}/C taskkill /IM $exeName /F${q}; Flags: runhidden; RunOnceId: ${q}KillApp${q}`r`n"

          # Write as ASCII - no BOM, fully compatible with Inno Setup
          $issPath = Join-Path (Get-Location).Path "setup.iss"
          [System.IO.File]::WriteAllText($issPath, $iss, [System.Text.Encoding]::ASCII)

          Write-Host "=== Generated setup.iss ==="
          Get-Content $issPath

          Write-Host "`n=== Compiling installer ==="
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc $issPath
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: Inno Setup compilation failed!"
            exit 1
          }

          Write-Host "`n=== Output directory contents ==="
          Get-ChildItem -Path $outputDir

          $installer = Get-ChildItem -Path $outputDir -Filter "*.exe" | Select-Object -First 1
          if ($null -eq $installer) {
            Write-Host "ERROR: No installer .exe found in $outputDir"
            exit 1
          }

          Write-Host "SUCCESS: Installer created at $($installer.FullName)"
          Write-Host "Size: $([math]::Round($installer.Length / 1MB, 2)) MB"
          "INSTALLER_NAME=$($installer.Name)"     | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INSTALLER_PATH=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: VSLA-Desktop-Installer-v${{ env.VERSION }}-build${{ github.run_number }}
          path: ${{ env.INSTALLER_PATH }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VSLA Desktop v${{ env.VERSION }} (build ${{ github.run_number }})
          tag_name: build-${{ github.run_number }}
          body: |
            ## VSLA Desktop v${{ env.VERSION }}

            ### How to install
            1. Download **${{ env.INSTALLER_NAME }}** below
            2. Double-click the installer
            3. Follow the setup wizard
            4. Launch **VSLA Desktop** from Start Menu or Desktop

            ### Requirements
            - Windows 10 or later (64-bit)
            - Internet connection required for login

            ### Build info
            - Branch: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
            - Build: `${{ github.run_number }}`
          files: ${{ env.INSTALLER_PATH }}
          draft: false
          prerelease: false
          token: ${{ secrets.GH_TOKEN }}