name: vsla_app
description: VSLA Desktop Application for Village Savings and Loans Associations
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.1
  provider: ^6.1.1
  flutter_secure_storage: ^9.0.0
  intl: ^0.18.1
  pdf: ^3.10.7
  printing: ^5.11.1
  connectivity_plus: ^5.0.2
  crypto: ^3.0.3
  uuid: ^4.3.3
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/